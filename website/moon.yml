toolchains:
  default: node
language: typescript
stack: frontend
layer: application
project:
  name: website
  description: Documentation and diagrams website for evt.
tasks:
  build:
    command: pnpm
    args:
      - run
      - build
    inputs:
      - '@group(sources)'
  dev:
    command: pnpm
    args:
      - run
      - dev
    preset: server
  test:
    command: pnpm
    args:
      - run
      - test
    inputs:
      - '@group(sources)'
  typecheck:
    command: pnpm
    args:
      - run
      - typecheck
    inputs:
      - '@group(sources)'
fileGroups:
  sources:
    - src/**/*
    - index.html
    - package.json
    - tsconfig.json
    - vite.config.ts
    # The site bundles the repo-root docs/ Markdown at build time (see src/docs.ts), so doc edits
    # must invalidate the build/typecheck cache. A leading "/" is workspace-relative in Moon.
    - /docs/**/*.md
