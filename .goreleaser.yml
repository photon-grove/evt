version: 2

project_name: evt

before:
  hooks:
    - go mod tidy

builds:
  - id: evt-doctor
    main: ./cmd/evt-doctor
    binary: evt-doctor
    # Build with the `prod` tag so dangerous, non-snapshot-safe helpers (e.g. dynamo.Delete,
    # guarded by `//go:build !prod`) are physically excluded from released binaries.
    flags:
      - -tags=prod
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: evt-doctor
    ids:
      - evt-doctor
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
